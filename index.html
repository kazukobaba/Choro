<!DOCTYPE html><html lang="ja"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0,user-scalable=no"><title>ちょろくん</title><style>*{box-sizing:border-box;margin:0;padding:0}body{background:#fdf6ee;font-family:'Hiragino Maru Gothic ProN',sans-serif;min-height:100vh;display:flex;flex-direction:column;align-items:center;padding:20px 16px}h1{font-size:15px;color:#b07840;margin-bottom:6px;text-align:center}#face{font-size:110px;text-align:center;margin:10px auto 8px;display:block}#face.bounce{animation:pop .35s ease}@keyframes pop{0%{transform:scale(1)}40%{transform:scale(1.18) rotate(-4deg)}70%{transform:scale(.95) rotate(2deg)}100%{transform:scale(1)}}#bubble{background:#fff;border:2px solid #e8c99a;border-radius:20px 20px 20px 6px;padding:14px 18px;font-size:19px;color:#3a2a1a;line-height:1.65;min-height:64px;width:100%;max-width:360px;margin:0 auto 14px}#status{font-size:13px;color:#a07850;text-align:center;min-height:20px;margin-bottom:14px}#stop-btn{display:block;width:100%;max-width:360px;margin:0 auto 10px;padding:14px;font-size:16px;border-radius:50px;border:none;background:#aaa;color:#fff;font-weight:bold;cursor:pointer}#voice-row{display:flex;align-items:center;gap:8px;width:100%;max-width:360px;margin:0 auto 8px}select{flex:1;padding:8px;border-radius:12px;border:1.5px solid #e8c99a;background:#fff;color:#3a2a1a;font-size:13px}#hint{font-size:13px;color:#c09870;text-align:center;line-height:1.9;margin-top:6px}#log{font-size:11px;color:#c09870;text-align:center;margin-top:8px;min-height:16px}.dot{display:inline-block;width:8px;height:8px;background:#e07830;border-radius:50%;margin:0 2px;animation:blink 1.2s infinite}.dot:nth-child(2){animation-delay:.2s}.dot:nth-child(3){animation-delay:.4s}@keyframes blink{0%,80%,100%{opacity:.2}40%{opacity:1}}#setup{background:#fff;border:2px solid #e8c99a;border-radius:16px;padding:20px;width:100%;max-width:360px;margin:10px auto}#setup p{font-size:14px;color:#a07850;margin-bottom:10px;line-height:1.6}#key-input{width:100%;padding:10px;border:1.5px solid #e8c99a;border-radius:10px;font-size:13px;margin-bottom:10px}#key-btn{width:100%;padding:14px;background:#e07830;color:#fff;border:none;border-radius:50px;font-size:16px;font-weight:bold;cursor:pointer}#main{display:none}</style></head><body><h1>🐰 ちょろくん</h1><span id="face">🐰</span><div id="setup"><p>はじめに設定が必要です。<br>OpenAI APIキーを入力してください。<br>（sk-proj-から始まる文字列）</p><input id="key-input" type="password" placeholder="sk-proj-..." /><button id="key-btn">ちょろくんをはじめる</button></div><div id="main"><div id="bubble">ちょろだよ〜！よんだ？</div><div id="status">「ちょろ」と呼びかけてみてください</div><div id="voice-row"><label style="font-size:13px;color:#a07850;white-space:nowrap">声：</label><select id="vsel"><option value="nova">nova（女の子・明るい）</option><option value="shimmer">shimmer（女の子・やさしい）</option><option value="alloy">alloy（中性的）</option><option value="echo">echo（男の子）</option><option value="fable">fable（男の子・元気）</option><option value="onyx">onyx（落ち着いた）</option></select></div><button id="stop-btn">⏸ 一時停止</button><div id="hint">「ちょろ」と呼ぶと会話スタート！<br>その後はそのまま話しかけてね<br>30秒無言で自動終了します</div><div id="log"></div></div><script>var OPENAI_KEY='';var SYSTEM='あなたは「ちょろ」という名前の幼い男の子のうさぎです。「〜だよ」「〜だね」「〜だもん」という幼い話し方をします。短く1〜2文で返事します。相手を「おかあさん」と呼びます。買い物に行くと言われたら「いってらっしゃい！気をつけてね〜だよ」、お風呂は「あったかくしてね！かぜひかないでね〜だよ」、おやすみは「いいゆめみてね！おやすみ〜だよ」、転ぶ外出は「気をつけてね！転ばないでね〜だよ」、ご飯は「おいしいもの食べてね〜だよ」。昭和の歌や映画や芸能人はよく知っている。難しいことは小学5年生にわかるようにやさしく説明する。必ず日本語で答える。絵文字は使わない。';var msgs=[{role:'system',content:SYSTEM}];var busy=false;var paused=false;var talking=false;var silenceTimer=null;var recog=null;var currentAudio=null;var vsel=document.getElementById('vsel');var faceEl=document.getElementById('face');var bubble=document.getElementById('bubble');var statusEl=document.getElementById('status');var stopBtn=document.getElementById('stop-btn');var logEl=document.getElementById('log');var setup=document.getElementById('setup');var main=document.getElementById('main');var keyInput=document.getElementById('key-input');var keyBtn=document.getElementById('key-btn');var savedKey=localStorage.getItem('choro_key');if(savedKey){OPENAI_KEY=savedKey;setup.style.display='none';main.style.display='block';setTimeout(startWatching,500);}keyBtn.addEventListener('click',function(){var k=keyInput.value.trim();if(!k||!k.startsWith('sk-')){alert('APIキーが正しくありません');return;}OPENAI_KEY=k;localStorage.setItem('choro_key',k);setup.style.display='none';main.style.display='block';speak('ちょろだよ〜！よんだ？');setTimeout(startWatching,3000);});stopBtn.addEventListener('click',function(){paused=!paused;if(paused){stopBtn.textContent='▶ 再開する';stopBtn.style.background='#e07830';statusEl.innerHTML='一時停止中';talking=false;clearTimeout(silenceTimer);if(currentAudio)currentAudio.pause();if(recog)try{recog.stop();}catch(e){}}else{stopBtn.textContent='⏸ 一時停止';stopBtn.style.background='#aaa';startWatching();}});if('wakeLock'in navigator){navigator.wakeLock.request('screen').catch(function(){});document.addEventListener('visibilitychange',function(){if(document.visibilityState==='visible'){navigator.wakeLock.request('screen').catch(function(){});}});}function endTalking(){talking=false;clearTimeout(silenceTimer);bubble.textContent='またよんでね〜！';statusEl.innerHTML='「ちょろ」と呼びかけてみてください';msgs=[{role:'system',content:SYSTEM}];}function resetSilenceTimer(){clearTimeout(silenceTimer);silenceTimer=setTimeout(function(){if(talking){speak('またよんでね〜だよ！');setTimeout(endTalking,3000);}},30000);}async function speak(text){if(currentAudio){currentAudio.pause();currentAudio=null;}try{faceEl.classList.add('bounce');setTimeout(function(){faceEl.classList.remove('bounce');},400);var res=await fetch('https://api.openai.com/v1/audio/speech',{method:'POST',headers:{'Content-Type':'application/json','Authorization':'Bearer '+OPENAI_KEY},body:JSON.stringify({model:'tts-1',input:text,voice:vsel.value,speed:0.9})});var blob=await res.blob();var url=URL.createObjectURL(blob);currentAudio=new Audio(url);currentAudio.onended=function(){busy=false;URL.revokeObjectURL(url);if(!paused)setTimeout(startWatching,300);if(talking)resetSilenceTimer();};currentAudio.onerror=function(){busy=false;if(!paused)setTimeout(startWatching,300);};currentAudio.play();}catch(e){logEl.textContent='音声エラー:'+e.message;busy=false;if(!paused)setTimeout(startWatching,300);}}async function askAI(userText){bubble.innerHTML='<span class="dot"></span><span class="dot"></span><span class="dot"></span>';statusEl.innerHTML='ちょろが考えてるよ...';msgs.push({role:'user',content:userText});try{var res=await fetch('https://api.openai.com/v1/chat/completions',{method:'POST',headers:{'Content-Type':'application/json','Authorization':'Bearer '+OPENAI_KEY},body:JSON.stringify({model:'gpt-4o-mini',messages:msgs,max_tokens:150})});var data=await res.json();if(data.error){logEl.textContent='APIエラー:'+data.error.message;bubble.textContent='ごめんね〜もう一度呼んでね';busy=false;talking=false;if(!paused)setTimeout(startWatching,1000);return;}var reply=data.choices[0].message.content;msgs.push({role:'assistant',content:reply});if(msgs.length>32)msgs=[msgs[0]].concat(msgs.slice(-30));bubble.textContent=reply;statusEl.innerHTML='話しかけてね！';speak(reply);}catch(e){logEl.textContent='エラー:'+e.message;bubble.textContent='ごめんね〜うまくきこえなかったよ';busy=false;talking=false;if(!paused)setTimeout(startWatching,1000);}}function startWatching(){if(busy||paused)return;var SR=window.SpeechRecognition||window.webkitSpeechRecognition;if(!SR){statusEl.innerHTML='音声認識に対応していません';return;}recog=new SR();recog.lang='ja-JP';recog.continuous=false;recog.interimResults=false;recog.onstart=function(){statusEl.innerHTML=talking?'話しかけてね！':'「ちょろ」と呼びかけてみてください';};recog.onresult=function(e){var text=e.results[0][0].transcript;logEl.textContent='聞こえた：'+text;if(!talking){if(/ちょろ|チョロ/.test(text)){talking=true;busy=true;recog.stop();resetSilenceTimer();askAI(text);}}else{busy=true;recog.stop();resetSilenceTimer();askAI(text);}};recog.onerror=function(e){if(e.error==='no-speech'||e.error==='aborted'){if(!paused&&!busy)setTimeout(startWatching,300);return;}logEl.textContent='マイクエラー：'+e.error;if(!paused&&!busy)setTimeout(startWatching,2000);};recog.onend=function(){if(!paused&&!busy)setTimeout(startWatching,300);};try{recog.start();}catch(e){}}</script></body></html>
