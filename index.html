<!DOCTYPE html><html lang="ja"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0,user-scalable=no"><title>ちょろくん</title><style>*{box-sizing:border-box;margin:0;padding:0}body{background:#fdf6ee;font-family:'Hiragino Maru Gothic ProN',sans-serif;min-height:100vh;display:flex;flex-direction:column;align-items:center;padding:20px 16px}h1{font-size:15px;color:#b07840;margin-bottom:6px}#face{font-size:110px;text-align:center;margin:10px auto 8px;display:block}#face.bounce{animation:pop .35s ease}@keyframes pop{0%{transform:scale(1)}40%{transform:scale(1.18) rotate(-4deg)}70%{transform:scale(.95) rotate(2deg)}100%{transform:scale(1)}}#bubble{background:#fff;border:2px solid #e8c99a;border-radius:20px 20px 20px 6px;padding:14px 18px;font-size:19px;color:#3a2a1a;line-height:1.65;min-height:64px;width:100%;max-width:360px;margin:0 auto 14px}#status{font-size:13px;color:#a07850;text-align:center;min-height:20px;margin-bottom:14px}#mic-btn{display:block;width:100%;max-width:360px;margin:0 auto 10px;padding:18px;font-size:18px;border-radius:50px;border:none;background:#e07830;color:#fff;font-weight:bold;cursor:pointer}#mic-btn.listening{background:#c0392b;animation:pulse 1s infinite}@keyframes pulse{0%,100%{box-shadow:0 4px 12px rgba(192,57,43,.3)}50%{box-shadow:0 4px 24px rgba(192,57,43,.6)}}#voice-row{display:flex;align-items:center;gap:8px;width:100%;max-width:360px;margin:0 auto 8px}select{flex:1;padding:8px;border-radius:12px;border:1.5px solid #e8c99a;background:#fff;color:#3a2a1a;font-size:13px}#hint{font-size:13px;color:#c09870;text-align:center;line-height:1.9;margin-top:6px}#log{font-size:11px;color:#c09870;text-align:center;margin-top:8px}.dot{display:inline-block;width:8px;height:8px;background:#e07830;border-radius:50%;margin:0 2px;animation:blink 1.2s infinite}.dot:nth-child(2){animation-delay:.2s}.dot:nth-child(3){animation-delay:.4s}@keyframes blink{0%,80%,100%{opacity:.2}40%{opacity:1}}</style></head><body><h1>🐰 ちょろくん</h1><span id="face">🐰</span><div id="bubble">ちょろだよ〜！よんだ？</div><div id="status">「ちょろ」と呼びかけてみてください</div><div id="voice-row"><label style="font-size:13px;color:#a07850;white-space:nowrap">声：</label><select id="vsel"></select></div><button id="mic-btn">🎤 話しかける</button><div id="hint">「ちょろ、買い物に行くね」<br>「ちょろさん、お風呂入るよ」<br>「ちょろ、今日のニュース教えて」</div><div id="log"></div><script>var GEMINI_API_KEY='AIzaSyAQ.Ab8RN6KW7M2_NWHjJ_qDbjYlQdVAUuRaiyihrsEf_Z8sC_HDuw';var GEMINI_URL='https://generativelanguage.googleapis.com/v1beta/models/gemini-2.0-flash:generateContent?key='+GEMINI_API_KEY;var SYSTEM='あなたは「ちょろ」という名前の幼い男の子のうさぎです。「〜だよ」「〜だね」「〜だもん」という幼い話し方をします。短く1〜2文で返事します。相手を「おかあさん」と呼びます。買い物に行くと言われたら「いってらっしゃい！気をつけてね〜だよ」、お風呂は「あったかくしてね！かぜひかないでねだよ」、おやすみは「いいゆめみてね！おやすみ〜だよ」。難しいことは小学5年生にわかるようにやさしく説明する。必ず日本語で答える。';var history=[];var synth=window.speechSynthesis||null;var voices=[];var vsel=document.getElementById('vsel');var faceEl=document.getElementById('face');var bubble=document.getElementById('bubble');var status=document.getElementById('status');var micBtn=document.getElementById('mic-btn');var logEl=document.getElementById('log');var busy=false;if('wakeLock'in navigator){navigator.wakeLock.request('screen').catch(function(){});}function loadVoices(){if(!synth)return;var all=synth.getVoices();if(!all||!all.length)return;var ja=all.filter(function(v){return v.lang&&v.lang.indexOf('ja')===0;});voices=ja.length?ja:all;vsel.innerHTML='';voices.forEach(function(v,i){var o=document.createElement('option');o.value=i;o.textContent=v.name;vsel.appendChild(o);});}if(synth){loadVoices();if(synth.onvoiceschanged!==undefined)synth.onvoiceschanged=loadVoices;setTimeout(loadVoices,500);setTimeout(loadVoices,1500);}function speak(text){if(!synth)return;synth.cancel();var u=new SpeechSynthesisUtterance(text);var vi=parseInt(vsel.value);if(!isNaN(vi)&&voices[vi])u.voice=voices[vi];u.lang='ja-JP';u.rate=0.82;u.pitch=1.55;u.volume=1.0;faceEl.classList.add('bounce');setTimeout(function(){faceEl.classList.remove('bounce');},400);u.onend=function(){status.textContent='また話しかけてね！';busy=false;};u.onerror=function(){busy=false;};synth.speak(u);}async function askGemini(userText){bubble.innerHTML='<span class="dot"></span><span class="dot"></span><span class="dot"></span>';status.textContent='ちょろが考えてるよ...';history.push({role:'user',parts:[{text:userText}]});try{var res=await fetch(GEMINI_URL,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({system_instruction:{parts:[{text:SYSTEM}]},contents:history})});var data=await res.json();var reply=data.candidates&&data.candidates[0]&&data.candidates[0].content&&data.candidates[0].content.parts&&data.candidates[0].content.parts[0].text?data.candidates[0].content.parts[0].text:'なーに〜？';history.push({role:'model',parts:[{text:reply}]});if(history.length>30)history=history.slice(-30);bubble.textContent=reply;status.textContent='ちょろがお返事したよ';speak(reply);}catch(e){bubble.textContent='ごめんね〜うまくきこえなかったよ';status.textContent='もう一度話しかけてね';busy=false;logEl.textContent='エラー:'+e.message;}}function startListening(){if(busy)return;var SR=window.SpeechRecognition||window.webkitSpeechRecognition;if(!SR){status.textContent='音声認識に対応していません';return;}busy=true;logEl.textContent='';var recog=new SR();recog.lang='ja-JP';recog.continuous=false;recog.interimResults=false;recog.onstart=function(){micBtn.classList.add('listening');micBtn.textContent='🔴 聞いています...';status.textContent='話しかけてください';};recog.onresult=function(e){var text=e.results[0][0].transcript;logEl.textContent='聞こえた：'+text;recog.stop();var hasChoro=/ちょろ|チョロ/.test(text);if(hasChoro||history.length>0){askGemini(text);}else{bubble.textContent='ちょろ〜ってよんでね〜！';status.textContent='「ちょろ」と言ってから話しかけてね';busy=false;}};recog.onerror=function(e){logEl.textContent='マイクエラー：'+e.error;status.textContent='もう一度ボタンを押してね';micBtn.classList.remove('listening');micBtn.textContent='🎤 話しかける';busy=false;};recog.onend=function(){micBtn.classList.remove('listening');micBtn.textContent='🎤 話しかける';};recog.start();}micBtn.addEventListener('click',startListening);setTimeout(function(){bubble.textContent='ちょろだよ〜！よんだ？';speak('ちょろだよ〜！よんだ？');},600);</script></body></html>
